{% extends 'base.html' %}
{% block title %}{{ item.title }} | DL Fantasy{% endblock %}
{% block content %}

<section class="hero hero-compact">
    <div class="hero-content parallax">
        <h1>{{ item.title }}</h1>
        <p class="meta">{{ item.created_at|date:"F Y" }} · {{ item.get_tag_display }}</p>
    </div>
</section>

<section class="archive">
    <div class="chapter-content">
        {{ item.body|linebreaks }}
    </div>

    <div class="chapter-nav">
        <a class="btn-outline" href="{% url 'news' %}" data-smart-back>&larr; Back</a>
    </div>
</section>

{% endblock %}
