{% extends 'base.html' %}
{% block content %}

<section class="hero">
    <div class="hero-content parallax">
        <h1>
            {{ category_label }}
        </h1>
    </div>
</section>

<section class="archive">
    <div class="archive-grid">
        {% for entry in entries %}
        <a class="archive-card concept-card show" href="{% url 'writings_detail' category entry.slug %}">
            <h3>{{ entry.title }}</h3>
            <p class="meta">{{ entry.created_at|date:"F j, Y" }}</p>
            <p>{{ entry.excerpt }}</p>
        </a>
        {% empty %}
        <p>Nothing here yet — check back soon.</p>
        {% endfor %}
    </div>
</section>

{% endblock %}
