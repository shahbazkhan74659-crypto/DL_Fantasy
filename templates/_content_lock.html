{% comment %}
Login gate shown over a blurred .chapter-content for anonymous visitors. Include right after the
element being blurred, inside a `.chapter-content-wrap` parent:

    <div class="chapter-content-wrap{% if content_locked %} is-locked{% endif %}">
        <div class="chapter-content">...</div>
        {% if content_locked %}{% include '_content_lock.html' %}{% endif %}
    </div>
{% endcomment %}
<div class="content-lock-overlay" id="content-lock">
    <div class="content-lock-card">
        <span class="content-lock-icon">
            <svg viewBox="0 0 24 24" width="26" height="26" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round">
                <rect x="4.5" y="10.5" width="15" height="10" rx="2"></rect>
                <path d="M8 10.5V7a4 4 0 0 1 8 0v3.5"></path>
            </svg>
        </span>
        <h3>Sign in to Read</h3>
        <a class="btn content-lock-btn" id="content-lock-login-btn" href="{% url 'login' %}?next={{ request.path|urlencode }}">Log In</a>
    </div>
</div>
